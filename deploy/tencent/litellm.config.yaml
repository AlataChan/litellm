# LiteLLM 代理配置（腾讯云部署）
#
# 接入 DeepSeek V4（2026 最新版）
#   - deepseek-v4-flash: 快速、便宜
#   - deepseek-v4-pro:   高质量，默认思考模式
#
# 为什么用 openai/ 前缀 + 显式 api_base？
#   LiteLLM 截至 v1.83.13-nightly 尚未在内置模型表里登记 V4 新模型，直接写
#   deepseek/deepseek-v4-pro 可能被当未知模型拒绝；而 DeepSeek 官方 API 本身就是
#   OpenAI 兼容格式，走 openai/ 前缀 + api_base 指向官方端点最稳，未来 DeepSeek
#   新增任何模型都能立刻用，无需等 LiteLLM 跟进。
#
# 思考模式（参考 https://api-docs.deepseek.com/zh-cn/guides/thinking_mode）：
#   - 开关: thinking: {"type": "enabled|disabled"}，默认 enabled
#   - 强度: reasoning_effort: "high" | "max"
#     注意：DeepSeek 将 low/medium 映射为 high，xhigh 映射为 max
#   为了避免被 LiteLLM 的 OpenAI-effort 校验降级，强度/思考参数统一放在 extra_body 里透传。

model_list:
  # ========== V4 Flash（主力快速模型）==========
  # 默认：思考 enabled + effort=high（DeepSeek 端默认值）
  - model_name: deepseek-v4-flash
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  # ========== V4 Pro（主力高质量模型）==========
  # 默认：思考 enabled + effort=high（DeepSeek 端默认值）
  - model_name: deepseek-v4-pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  # ========== V4 Pro - 非思考模式（更快 + 更便宜）==========
  - model_name: deepseek-v4-pro-nothink
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
      extra_body:
        thinking:
          type: disabled

  # ========== V4 Pro - 最大思考强度（复杂推理 / Agent）==========
  - model_name: deepseek-v4-pro-max
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
      extra_body:
        reasoning_effort: max
        thinking:
          type: enabled

  # ========== V4 Flash - 非思考模式 ==========
  - model_name: deepseek-v4-flash-nothink
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
      extra_body:
        thinking:
          type: disabled

  # ========== 兼容旧名（2026/07/24 前仍可用）==========
  - model_name: deepseek-chat
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-reasoner
    litellm_params:
      model: openai/deepseek-reasoner
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  # ========== Kimi K2.6（Moonshot，OpenAI 兼容）==========
  # 文档：
  #   - 视觉模型：https://platform.kimi.com/docs/guide/use-kimi-vision-model
  #   - 多轮对话：https://platform.kimi.com/docs/guide/engage-in-multi-turn-conversations-using-kimi-api
  #   - 思考模型：https://platform.kimi.com/docs/guide/use-kimi-k2-thinking-model
  #
  # Kimi K2.6 / K2.5 默认启用 thinking；禁用时使用 thinking.type=disabled。
  # K2.6/K2.5 对采样参数有固定要求：thinking 模式 temperature 只能为 1.0，
  # no-think 模式 temperature 固定为 0.6；top_p/n/penalty 等也有固定值。
  # 许多客户端会默认传 temperature=0.7，Moonshot 会直接报 400。
  # 因此所有 Kimi 别名都用 additional_drop_params 丢弃客户端传入的采样参数，
  # 让 Moonshot 使用模型默认值。
  - model_name: kimi-k2.6
    litellm_params:
      model: openai/kimi-k2.6
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params: &kimi_sampling_params
        - temperature
        - top_p
        - n
        - presence_penalty
        - frequency_penalty

  # Kimi K2.6 非思考模式：更快、更省 tokens。
  - model_name: kimi-k2.6-nothink
    litellm_params:
      model: openai/kimi-k2.6
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params: *kimi_sampling_params
      extra_body:
        thinking:
          type: disabled

  # Kimi K2.6 Preserved Thinking：
  # 需要客户端把历史 assistant message 里的 reasoning_content 原样带回 messages。
  # reasoning_content 会计入上下文与费用，只建议多步推理 / 工具调用场景使用。
  - model_name: kimi-k2.6-preserved-thinking
    litellm_params:
      model: openai/kimi-k2.6
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params: *kimi_sampling_params
      extra_body:
        thinking:
          type: enabled
          keep: all

  # Kimi K2.6 Vision：
  # 请求时 message.content 必须是数组，图片用 image_url 的 base64 data URL；
  # Kimi 当前不支持直接传公网图片 URL。
  - model_name: kimi-k2.6-vision
    litellm_params:
      model: openai/kimi-k2.6
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params: *kimi_sampling_params

  # 专门思考模型：强制启用思考，适合复杂推理和多步工具调用。
  - model_name: kimi-k2-thinking
    litellm_params:
      model: openai/kimi-k2-thinking
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params: *kimi_sampling_params
      max_tokens: 32768

  # 旧一代/兼容：默认也具备思考能力，可按需使用。
  - model_name: kimi-k2.5
    litellm_params:
      model: openai/kimi-k2.5
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params: *kimi_sampling_params

  # ========================================================================
  # 新增模型只需在本 model_list 里追加条目（api_key 走 os.environ/XXX 即可），
  # 然后去服务器 /opt/litellm/.env 填好对应 key，push 到 main 自动部署。
  # 下面是常用 provider 的模板（需要启用就去掉 `# ` 注释）：
  # ========================================================================

  # --- 国内 ---
  # - model_name: qwen-max
  #   litellm_params:
  #     model: dashscope/qwen-max
  #     api_key: os.environ/DASHSCOPE_API_KEY
  #
  # - model_name: glm-4-plus
  #   litellm_params:
  #     model: zhipu/glm-4-plus
  #     api_key: os.environ/ZHIPUAI_API_KEY
  #
  # - model_name: doubao
  #   litellm_params:
  #     model: volcengine/doubao-pro-32k
  #     api_key: os.environ/VOLCENGINE_API_KEY

  # --- 国际 ---
  # - model_name: gpt-4o
  #   litellm_params:
  #     model: openai/gpt-4o
  #     api_key: os.environ/OPENAI_API_KEY
  #
  # - model_name: claude-sonnet
  #   litellm_params:
  #     model: anthropic/claude-sonnet-4-5
  #     api_key: os.environ/ANTHROPIC_API_KEY
  #
  # - model_name: gemini-pro
  #   litellm_params:
  #     model: gemini/gemini-2.5-pro
  #     api_key: os.environ/GEMINI_API_KEY
  #
  # - model_name: grok
  #   litellm_params:
  #     model: xai/grok-4
  #     api_key: os.environ/XAI_API_KEY


litellm_settings:
  drop_params: false
  num_retries: 2
  request_timeout: 120
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
